name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run arena unit + integration tests
        run: node --test --test-timeout=15000 packages/arena/test/*.mjs

      - name: Install wasm-tools
        run: |
          WASM_TOOLS_VERSION="1.245.1"
          curl -fsSL "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /tmp
          mv /tmp/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-unknown-linux-musl/wasm-tools /usr/local/bin/wasm-tools
          chmod +x /usr/local/bin/wasm-tools
          wasm-tools --version

      - name: Validate WIT interface
        run: wasm-tools component wit wit/agent.wit